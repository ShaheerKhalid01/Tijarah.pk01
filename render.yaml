@"
services:
  - type: web
    name: tijarah-pk
    env: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXTAUTH_URL
        value: https://tijarah-pk.onrender.com
      - key: NEXTAUTH_SECRET
        sync: false
      - key: MONGODB_URI
        sync: false
"@ | Out-File -FilePath render.yaml -Encoding utf8